<!DOCTYPE html>
<html lang="fr" data-theme="nord">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulaire de contact (sans base de données)</title>

    <!-- Tailwind + daisyUI via CDN, comme à l'étape 3 du brief. -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/daisyui.css" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
  </head>
  <body>

    <main class="p-6 max-w-md mx-auto flex flex-col gap-4">

      <h1 id="mon-unique-h1" class="text-2xl font-bold">Me contacter</h1>

      <form id="contact" class="flex flex-col gap-3">
        <div class="flex flex-col gap-1">
          <label for="nom">Ton nom</label>
          <input type="text" id="nom" class="input w-full" placeholder="Camille" />
        </div>

        <div class="flex flex-col gap-1">
          <label for="email">Ton e-mail</label>
          <input type="email" id="email" class="input w-full" placeholder="camille@exemple.fr" />
        </div>

        <div class="flex flex-col gap-1">
          <label for="message">Ton message</label>
          <textarea id="message" class="textarea w-full" rows="4" placeholder="Ton message…"></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Envoyer</button>
      </form>

      <!-- Zone de retour, remplie par script.js -->
      <p id="confirmation" class="font-semibold"></p>
<label class="input validator">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
    <g fill="none">
      <path
        d="M7.25 11.5C6.83579 11.5 6.5 11.8358 6.5 12.25C6.5 12.6642 6.83579 13 7.25 13H8.75C9.16421 13 9.5 12.6642 9.5 12.25C9.5 11.8358 9.16421 11.5 8.75 11.5H7.25Z"
        fill="currentColor"
      ></path>
      <path
        fill-rule="evenodd"
        clip-rule="evenodd"
        d="M6 1C4.61929 1 3.5 2.11929 3.5 3.5V12.5C3.5 13.8807 4.61929 15 6 15H10C11.3807 15 12.5 13.8807 12.5 12.5V3.5C12.5 2.11929 11.3807 1 10 1H6ZM10 2.5H9.5V3C9.5 3.27614 9.27614 3.5 9 3.5H7C6.72386 3.5 6.5 3.27614 6.5 3V2.5H6C5.44771 2.5 5 2.94772 5 3.5V12.5C5 13.0523 5.44772 13.5 6 13.5H10C10.5523 13.5 11 13.0523 11 12.5V3.5C11 2.94772 10.5523 2.5 10 2.5Z"
        fill="currentColor"
      ></path>
    </g>
  </svg>
  <input
    type="tel"
    class="tabular-nums"
    required
    placeholder="Phone"
    pattern="[0-9]*"
    minlength="10"
    maxlength="10"
    title="Must be 10 digits"
  />
</label>
<p class="validator-hint">Must be 10 digits</p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
